[project]
name = "twp-ai"
version = "0.1.0"
description = "twp-ai — twp-ai event streaming adapter"
requires-python = ">=3.10"
dependencies = [
    "fastapi==0.136.3",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "pytest-httpserver>=1.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/twp_ai"]
