on:
  push:
    branches:
      - develop
      - dev
      - main
      - release
      - master
  pull_request:
    branches:
      - '**'

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "0.8.17"

      - name: Setup Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run Lint (Ruff)
        run: uv run ruff check src/ tests/ --fix

      - name: Run Format (Ruff)
        run: uv run ruff format src/ tests/

      - name: Run Tests with Coverage (Pytest)
        # Unit + integration. E2E runs in the companion `e2e-smoke` job
        # below so spec-listed SLOs are not gated only on a manual run
        # (see docs/00_journal.md: "E2E gate integrity" rule).
        run: uv run pytest --cov=src --cov-report=term-missing --ignore=tests/e2e

      - name: Run Security Check (Bandit)
        run: uv run bandit -r src/ --severity-level high --confidence-level high

      - name: Check dependency vulnerabilities (Safety)
        run: |
          uv export --no-hashes | uv run safety check --stdin --full-report > safety_report.txt || true
          if grep -iq "Critical" safety_report.txt; then
            cat safety_report.txt
            echo "❌ Critical vulnerabilities found!"
            exit 1
          else
            echo "✅ No Critical vulnerabilities found."
          fi

  e2e-smoke:
    name: E2E Smoke (T7.2 + T2v.45 against WireMock)
    runs-on: ubuntu-latest
    needs: ci
    env:
      # Smoke scale: 20 docs / 15s. Nightly / manual runs use the spec'd
      # 100 / 60s defaults to enforce absolute throughput. See
      # tests/e2e/test_ingest_success_rate.py.
      RAGENT_E2E_INGEST_COUNT: "20"
      RAGENT_E2E_INGEST_DEADLINE: "15"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "0.8.17"

      - name: Setup Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run E2E suite
        # The retrieval-recall SLO (test_golden_set_top3) stays
        # xfail(run=False) here because RAGENT_E2E_GOLDEN_SET is unset —
        # WireMock vectors would not give a meaningful 70% number. Run
        # `make test-e2e-golden` against real endpoints to enforce that
        # SLO (T7.3.x plan track).
        run: uv run pytest tests/e2e -v --tb=short
