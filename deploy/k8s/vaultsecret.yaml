# Vault Secrets Operator (VSO) — syncs Vault KV-v2 path to a native K8s Secret
# named `ragent-secrets`, which Deployments mount via `envFrom: secretRef`.
#
# Prereq (one-time, cluster-wide):
#   - VSO installed (helm chart `hashicorp/vault-secrets-operator`)
#   - VaultConnection + VaultAuth (kubernetes auth method) configured in the
#     ragent namespace; referenced below as `ragent-vault-auth`.
#
# Vault KV-v2 layout expected at `kv/ragent/prod`:
#   MARIADB_DSN, ES_USERNAME, ES_PASSWORD, ES_API_KEY, MINIO_SITES,
#   AI_LLM_API_J1_TOKEN, AI_EMBEDDING_API_J1_TOKEN, AI_RERANK_API_J1_TOKEN,
#   UNPROTECT_APIKEY, FEEDBACK_HMAC_SECRET,
#   REDIS_BROKER_URL, REDIS_RATELIMIT_URL   # contain user:pass — keep in Vault
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: ragent-vault-auth
  namespace: ragent
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: ragent
    serviceAccount: ragent
    audiences:
      - vault
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: ragent-secrets
  namespace: ragent
spec:
  type: kv-v2
  mount: kv
  path: ragent/prod
  refreshAfter: 60s
  vaultAuthRef: ragent-vault-auth
  destination:
    name: ragent-secrets
    create: true
    # When the synced Secret changes, VSO patches a rollout-trigger annotation
    # so Deployments referencing it via `envFrom` get restarted automatically.
    rolloutRestartTargets:
      - kind: Deployment
        name: ragent-api
      - kind: Deployment
        name: ragent-worker
