apiVersion: apps/v1
kind: Deployment
metadata:
  name: ragent-api
  namespace: ragent
  labels:
    app.kubernetes.io/name: ragent
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ragent
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ragent
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: ragent
      containers:
        - name: api
          image: ragent:latest
          command: ["python", "-m", "ragent.api"]
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: ragent-config
            - secretRef:
                name: ragent-secrets
          env:
            - name: OTEL_SERVICE_NAME
              value: ragent-api
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ragent-worker
  namespace: ragent
  labels:
    app.kubernetes.io/name: ragent
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ragent
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ragent
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: ragent
      containers:
        - name: worker
          image: ragent:latest
          command: ["python", "-m", "ragent.worker"]
          envFrom:
            - configMapRef:
                name: ragent-config
            - secretRef:
                name: ragent-secrets
          env:
            - name: OTEL_SERVICE_NAME
              value: ragent-worker
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
